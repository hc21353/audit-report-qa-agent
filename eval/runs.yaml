# ============================================================
# runs.yaml - 평가 실험 설정
#
# 생성 모델과 채점 모델은 분리되어 있음:
#   - 생성 모델: 각 run의 model / models 필드로 지정 (없으면 agents.yaml 기본값)
#   - 채점 모델: eval/judge.py의 JUDGE_MODEL 상수로 고정 (항상 동일)
#
# 모델 오버라이드 우선순위:
#   CLI --model > run.models (에이전트별) > run.model (전체 동일) > agents.yaml
#
# 사용법:
#   python eval/run_eval.py                              # 전체 실험
#   python eval/run_eval.py --run koe5_qwen3.5           # 단일 실험
#   python eval/run_eval.py --model qwen2.5:14b          # 전체 실험 모델 오버라이드
#   python eval/run_eval.py --questions q01,q05          # 특정 질문만
#   python eval/run_eval.py --skip-judge                 # Judge 없이 답변만
# ============================================================

output_dir: ./experiments

runs:
  # ── 기본 설정 (agents.yaml 모델 그대로) ──────────────────

  - name: koe5_default
    description: "기본: ChromaDB + KoE5 + agents.yaml 기본 모델"
    vector_store: chroma
    # model 미지정 → agents.yaml의 모델 사용

  # ── LLM 모델 비교 실험 ────────────────────────────────────
  # 채점은 judge.py의 JUDGE_MODEL로 고정되므로 공정한 비교 가능

  # - name: koe5_qwen2.5_14b
