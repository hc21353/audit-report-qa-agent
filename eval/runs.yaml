  #   vector_store: chroma
  #   model: qwen2.5:14b

  # - name: koe5_qwen2.5_7b
  #   description: "비교: ChromaDB + KoE5 + qwen2.5:7b (경량 모델)"
  #   vector_store: chroma
  #   model: qwen2.5:7b

  # - name: koe5_mixed_models
  #   description: "비교: 에이전트별 모델 분리 (retriever/analyst만 14b)"
  #   vector_store: chroma
  #   models:                              # 에이전트별 개별 지정
  #     orchestrator:   qwen2.5:7b
