    expected_years: [2020, 2024]
    ground_truth: "유동자산 증가;재고자산 증가"
    expected_answer: "유동자산 증가;재고자산 증가"

  - id: q13
    question: "2019년과 2023년의 핵심감사사항을 비교해줘"
    type: year_comparison
    expected_years: [2019, 2023]
    ground_truth: "매출차감 유지;감가상각→재고평가"
    expected_answer: "매출차감 유지;감가상각→재고평가"

  - id: q14
    question: "2021년과 2024년 총자산 및 자기자본 변화를 비교 분석해줘"
    type: year_comparison
    expected_years: [2021, 2024]
    ground_truth: "총자산 증가;자본 증가"
    expected_answer: "총자산 증가;자본 증가"

  - id: q15
    question: "2022년과 2023년의 영업이익 차이와 그 배경을 설명해줘"
    type: year_comparison
    expected_years: [2022, 2023]
    ground_truth: "흑자→적자;재고평가 영향"
    expected_answer: "흑자→적자;재고평가 영향"

  - id: q16
    question: "최근 5년간 유동자산 추이를 설명해줘"
    type: trend_analysis
    expected_years: [2020, 2021, 2022, 2023, 2024]
    ground_truth: "감소 후 증가"
    expected_answer: "감소 후 증가"

  - id: q17
    question: "감사의견이 변경된 연도가 있는가? 전체 연도 기준으로 알려줘"
    type: trend_analysis
    expected_years: "all"
    ground_truth: "변경없음"
    expected_answer: "변경없음"

  - id: q18
    question: "2015년부터 2024년까지 총자산 변화 추이를 요약해줘"
    type: trend_analysis
    expected_years: "2015-2024"
    ground_truth: "전반적 증가"
    expected_answer: "전반적 증가"

  - id: q19
    question: "최근 3년간 핵심감사사항의 주요 변화가 있었는지 설명해줘"
    type: trend_analysis
    expected_years: [2022, 2023, 2024]
    ground_truth: "매출차감 유지;재고→감가상각 변경"
    expected_answer: "매출차감 유지;재고→감가상각 변경"

  - id: q20
    question: "2019년부터 2024년까지 부채비율은 어떻게 변화했는가?"
    type: trend_analysis
    expected_years: [2019, 2020, 2021, 2022, 2023, 2024]
    ground_truth: "상승"
    expected_answer: "상승"

  - id: q21
    question: "2024년 유동비율과 부채비율을 계산해줘"
    type: calculation
    expected_year: 2024
    expected_tools: [calculator]
    ground_truth: "102.70%;37.47%"
    expected_answer: "102.70%;37.47%"

  - id: q22
    question: "최근 3년 ROA 추이를 보여줘"
    type: calculation
    expected_years: [2022, 2023, 2024]
    expected_tools: [calculator]
    ground_truth: "9.94%;9.12%;7.58%"
    expected_answer: "9.94%;9.12%;7.58%"

  - id: q23
    question: "2024년 자기자본이익률(ROE)을 계산하고 이전 연도와 비교해줘"
    type: calculation
    expected_years: [2023, 2024]
    expected_tools: [calculator]
    ground_truth: "11.70%→10.23%"
