# ============================================================
# questions.yaml - 평가용 질문셋
#
# expected_answer 작성 요령:
#   - 수치가 있는 경우 단위까지 정확히 기재 (예: "324,966,127백만원")
#   - 여러 항목이면 줄바꿈 없이 세미콜론으로 구분
#   - 확인되지 않은 항목은 빈 문자열("")로 유지
#   - LLM judge가 이 값을 accuracy 채점 기준으로 사용함
# ============================================================

questions:

  # ──────────────────────────────────────────────────────────
  # 단순 조회 (simple_lookup)
  # ──────────────────────────────────────────────────────────

  - id: q01
    question: "2024년 삼성전자의 총자산은 얼마인가?"
    type: simple_lookup
    expected_year: 2024
    ground_truth: "324,966,127백만원"
    expected_answer: ""   # 예: "2024년 삼성전자 총자산은 324,966,127백만원이며 전년 대비 X% 증가하였습니다."

  - id: q02
    question: "2024년 핵심감사사항은 무엇인가?"
