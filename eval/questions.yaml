    question: "2024년 감사보고서의 감사범위는 어떻게 되나요?"
    type: section_lookup
    expected_year: 2024
    expected_section: "독립된 감사인의 감사보고서"
    ground_truth: "재무상태표;손익계산서;포괄손익;자본변동;현금흐름;주석"
    expected_answer: "재무상태표;손익계산서;포괄손익;자본변동;현금흐름;주석"

  - id: q10
    question: "2021년 주요 회계추정 가정 중 판매보증충당부채 내용을 알려줘"
    type: section_lookup
    expected_year: 2021
    ground_truth: "과거경험기반 추정"
    expected_answer: "과거경험기반 추정"

  - id: q11
    question: "2018년 대비 2022년 부채 구조가 어떻게 변했는가?"
    type: year_comparison
    expected_years: [2018, 2022]
    ground_truth: "총부채 증가;유동부채 증가;비유동부채 증가"
    expected_answer: "총부채 증가;유동부채 증가;비유동부채 증가"

