    ground_truth: ""
    expected_answer: ""   # 예: "2024년 핵심감사사항은 (1) ... (2) ... 입니다."

  - id: q03
    question: "2024년 감사의견은?"
    type: simple_lookup
    expected_year: 2024
    ground_truth: "적정"
    expected_answer: ""   # 예: "2024년 삼성전자 재무제표에 대한 감사의견은 적정입니다."

