  - id: q26
    question: "2024년 핵심감사사항으로 선정된 항목들이 재무제표의 어떤 항목과 관련이 있는지 설명해줘"
    type: multi_hop
    expected_year: 2024
    expected_sections: ["독립된 감사인의 감사보고서", "재무제표"]
    ground_truth: "유형자산;매출"
    expected_answer: "유형자산;매출"

  - id: q27
    question: "삼성전자의 수익인식 기준은 어떻게 되며, 이것이 영업이익에 미치는 영향은?"
    type: multi_hop
    expected_section: "주석"
    ground_truth: "통제이전;매출차감;반품추정"
    expected_answer: "통제이전;매출차감;반품추정"

  - id: q28
    question: "2023년과 2024년 재고자산 금액을 비교하고, 재고자산 평가 기준도 함께 설명해줘"
    type: multi_hop
    expected_years: [2023, 2024]
    expected_sections: ["재무제표", "주석"]
    ground_truth: "29,338,151백만원;29,154,115백만원;원가/NRV"
    expected_answer: "29,338,151백만원;29,154,115백만원;원가/NRV"

  - id: q29
    question: "삼성전자 감사보고서에서 내부회계관리제도 감사보고서는 어떤 내용을 담고 있나?"
    type: general_explain
    expected_section: "내부회계관리제도 감사보고서"
    ground_truth: "내부통제 효과성"
    expected_answer: "내부통제 효과성"

  - id: q30
    question: "외부감사 실시내용에서 감사팀의 구성과 감사 절차는 어떻게 설명되어 있나?"
    type: general_explain
    expected_section: "외부감사 실시내용"
    ground_truth: "위험평가;표본검사;내부통제검토"
    expected_answer: "위험평가;표본검사;내부통제검토"