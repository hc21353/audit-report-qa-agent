name: Financial RAG CI Pipeline

on:
  push:
    branches: [ main, dev ] # 메인이나 데브 브랜치에 푸시될 때
  pull_request:
    branches: [ main ]      # 머지 요청이 올 때

jobs:
  test:
    runs-on: ubuntu-latest  # 리눅스 환경에서 실행

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Build and Run Tests
        run: |
          # 1. 도커 컨테이너 빌드 및 실행 (-d는 백그라운드)
          docker-compose up --build -d
          
          # 2. 파이썬 컨테이너 안에서 pytest 실행 (컨테이너 이름이 'app'이라고 가정)
          # -T는 터미널 할당 제외(CI 환경용)
          docker-compose exec -T app pytest tests/
          
          # 3. 테스트 종료 후 정리
          docker-compose down